service ProjectService {
  rpc ProjectCreate(CreateProjectReq) returns (IdResp);
  rpc ProjectUpdate(UpdateProjectReq) returns (EmptyResp);
  rpc ProjectDelete(DeleteByIdReq) returns (EmptyResp);
  rpc ProjectGet(GetByIdReq) returns (GetProjectResp);
  rpc ProjectList(ListProjectReq) returns (ListProjectResp);
