// 渠道变量相关消息定义
message VariableSpec {
  int64 id = 1;
  string specProfile = 2;
  string fieldKey = 3;
  string fieldName = 4;
  string fieldKind = 5;
  string providerKey = 6;
  string uiControl = 7;
  string dependencies = 8;
  bool allowManualInput = 9;
  bool isRequired = 10;
  string defaultValue = 11;
  string placeholder = 12;
  string helpText = 13;
  int32 sortOrder = 14;
}

message GetChannelVariableSpecsReq {
  string groupCode = 1;
  string channelTypeCode = 2;
  string specProfile = 3;
}

message GetChannelVariableSpecsResp {
  repeated VariableSpec specs = 1;
}

message VariableOption {
  string label = 1;
  string value = 2;
  bool disabled = 3;
  repeated VariableOption children = 4;
  string extra = 5;
}

message QueryDynamicOptionsReq {
  int64 channelInstanceId = 1;
  string providerKey = 2;
  map<string, string> parentValues = 3;
  int64 projectId = 4;
}

message QueryDynamicOptionsResp {
  repeated VariableOption options = 1;
}

message ResolveAddressReq {
  string address = 1;
  string channelTypeCode = 2;
  int64 projectId = 3;
}

message ResolveAddressResp {
  bool resolved = 1;
  int64 channelInstanceId = 2;
  map<string, string> fields = 3;
  string reason = 4;
}

message RenderOutputReq {
  int64 channelInstanceId = 1;
  string providerKey = 2;
  map<string, string> values = 3;
  int64 projectId = 4;
}

message RenderOutputResp {
  string output = 1;
}

message ValidateVariableValuesReq {
  string specProfile = 1;
  map<string, string> values = 2;
  int64 projectId = 3;
}

message ValidateVariableValuesResp {
  bool valid = 1;
  repeated string errors = 2;
}

message ResolveCredentialReq {
  int64 endpointId = 1;
  string address = 2;
  string channelTypeCode = 3;
  int64 projectId = 4;
}

message ResolveCredentialResp {
  int64 credentialId = 1;
  string credentialName = 2;
  string credentialType = 3;
}

service ChannelVariableService {
  rpc GetChannelVariableSpecs(GetChannelVariableSpecsReq) returns (GetChannelVariableSpecsResp);
  rpc QueryDynamicOptions(QueryDynamicOptionsReq) returns (QueryDynamicOptionsResp);
  rpc ResolveAddress(ResolveAddressReq) returns (ResolveAddressResp);
  rpc RenderOutput(RenderOutputReq) returns (RenderOutputResp);
  rpc ValidateVariableValues(ValidateVariableValuesReq) returns (ValidateVariableValuesResp);
  rpc ResolveCredential(ResolveCredentialReq) returns (ResolveCredentialResp);
}
