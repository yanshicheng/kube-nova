---
apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-api-config
  namespace: kube-nova
data:
  config.yaml: |
    Name: devops-api
    Host: 0.0.0.0
    Port: 8813
    Mode: pro
    Timeout: ${DEFAULT_TIMEOUT}
    MaxBytes: 104857600

    DevServer:
      Enabled: true
      Port: 9999
      HealthPath: "/healthz"
      MetricsPath: "/metrics"
      EnableMetrics: true

    Telemetry:
      Name: devops-api
      Endpoint: ${JAEGER_ENDPOINT}
      Sampler: ${TELEMETRY_SAMPLER}
      Batcher: ${TELEMETRY_BATCHER}

    Log:
      ServiceName: devops-api
      Mode: console
      Encoding: plain
      TimeFormat: "2006-01-02 15:04:05"
      Path: logs
      Level: info
      MaxContentLength: 1024
      Compress: false
      Stat: true
      KeepDays: 7
      StackCooldownMillis: 100
      MaxBackups: 0
      MaxSize: 0
      Rotation: daily

    Cache:
      Host: ${REDIS_HOST}:${REDIS_PORT}
      Type: ${REDIS_TYPE}
      Pass: ${REDIS_PASSWORD}
      Tls: ${REDIS_TLS}
      NonBlock: ${REDIS_NONBLOCK}
      PingTimeout: ${REDIS_PING_TIMEOUT}

    PortalRpc:
      Target: k8s://${POD_NAMESPACE}/portal-rpc:30010
      Optional: true
      NonBlock: true
      Timeout: ${DEFAULT_TIMEOUT}

    DevopsManagerRpc:
      Target: k8s://${POD_NAMESPACE}/devops-manager-rpc:30031
      Optional: true
      NonBlock: true
      Timeout: ${DEFAULT_TIMEOUT}

    DevopsPipelineRpc:
      Target: k8s://${POD_NAMESPACE}/devops-pipeline-rpc:30032
      Optional: true
      NonBlock: true
      Timeout: ${DEFAULT_TIMEOUT}

    DevopsQualityRpc:
      Target: k8s://${POD_NAMESPACE}/devops-quality-rpc:30033
      Optional: true
      NonBlock: true
      Timeout: ${DEFAULT_TIMEOUT}

    StorageConf:
      Provider: s3
      Endpoints: ["${MINIO_ENDPOINT}"]
      EndpointProxy: "http://${MINIO_ENDPOINT}"
      AccessKey: ${MINIO_ACCESS_KEY}
      AccessSecret: ${MINIO_SECRET_KEY}
      BucketName: devops-artifacts
      CAFile: ""
      CAKey: ""
      ClientCertFile: ""
      ClientKeyFile: ""
      UseTLS: false
