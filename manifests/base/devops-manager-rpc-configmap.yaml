---
apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-manager-rpc-config
  namespace: kube-nova
data:
  config.yaml: |
    Name: devops-manager.rpc
    ListenOn: 0.0.0.0:30031
    Mode: pro
    Timeout: ${DEFAULT_TIMEOUT}

    DevServer:
      Enabled: true
      Port: 9999
      HealthPath: "/healthz"
      MetricsPath: "/metrics"
      EnableMetrics: true

    Telemetry:
      Name: devops-manager-rpc
      Endpoint: ${JAEGER_ENDPOINT}
      Sampler: ${TELEMETRY_SAMPLER}
      Batcher: ${TELEMETRY_BATCHER}

    Log:
      ServiceName: devops-manager-rpc
      Mode: console
      Encoding: plain
      TimeFormat: "2006-01-02 15:04:05"
      Path: logs
      Level: info
      MaxContentLength: 1024
      Compress: false
      Stat: true
      KeepDays: 7
      StackCooldownMillis: 100
      MaxBackups: 0
      MaxSize: 0
      Rotation: daily

    Mongo:
      Url: ${MONGO_URL}
      Db: ${MONGO_DB}

    Bootstrap:
      DefaultDataEnabled: ${DEVOPS_BOOTSTRAP_DEFAULT_DATA}
      TektonStepSyncEnabled: ${DEVOPS_BOOTSTRAP_TEKTON_SYNC}

    Cache:
      Host: ${REDIS_HOST}:${REDIS_PORT}
      Type: ${REDIS_TYPE}
      Pass: ${REDIS_PASSWORD}
      Tls: ${REDIS_TLS}
      NonBlock: ${REDIS_NONBLOCK}
      PingTimeout: ${REDIS_PING_TIMEOUT}

    StorageConf:
      Provider: minio
      Endpoints: ["${MINIO_ENDPOINT}"]
      EndpointProxy: "https://${MINIO_ENDPOINT}"
      AccessKey: ${MINIO_ACCESS_KEY}
      AccessSecret: ${MINIO_SECRET_KEY}
      BucketName: devops-artifacts
      CAFile: ""
      CAKey: ""
      ClientCertFile: ""
      ClientKeyFile: ""
      UseTLS: ${MINIO_USE_TLS}
